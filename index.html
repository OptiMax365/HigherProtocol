<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neon Quote Bet</title>

<!-- REPLACE YOUR CURRENT BODY CSS WITH THIS -->

<style>

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:
    radial-gradient(circle at top,#003b2b,#00150f 60%);

    color:white;

    overflow:hidden;

    -webkit-tap-highlight-color:transparent;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* MAIN CARD */

.main-card{

    width:100vw;
    height:100vh;

    overflow:hidden;

    display:flex;
    flex-direction:column;

    position:relative;

    padding:
    clamp(8px,1vw,18px);

    gap:1vh;
}

/* TOP BALANCE */

.balance-box{

    position:absolute;

    top:0;
    right:0;

    background:#1fd45f;

    width:clamp(110px,12vw,150px);
    height:clamp(38px,5vh,50px);

    border-bottom-left-radius:14px;

    padding:6px 10px;

    z-index:20;

    box-shadow:
    0 0 20px #1fd45f,
    0 0 50px rgba(31,212,95,.5);

    animation:balancePulse 2s infinite;
}

.balance-title{
    font-size:9px;
    opacity:.8;
}

.balance{
    font-size:clamp(18px,2vw,28px);
    font-weight:900;
}

/* TITLE */

.main-title{

    text-align:center;

    margin-top:5vh;

    font-size:clamp(18px,3vw,42px);

    font-weight:300;

    letter-spacing:2px;

    line-height:1.1;

    text-transform:uppercase;

    color:white;

    animation:titlePulse .5s infinite alternate;
}

/* TIMER */

.timer{

    position:absolute;

    top:12vh;

    left:50%;

    transform:translateX(-50%);

    font-size:clamp(20px,3vw,36px);

    font-weight:900;

    color:#39ff14;

    text-shadow:
    0 0 10px #39ff14,
    0 0 30px #39ff14;

    opacity:0;

    transition:.4s;
}

/* QUOTES */

.quote-grid{

    flex:1;

    width:100%;

    display:grid;

    grid-template-columns:
    repeat(3,minmax(0,1fr));

    gap:1vh;

    margin-top:2vh;

    overflow:hidden;
}

.quote-btn{

    background:transparent;

    border:none;

    color:white;

    font-size:clamp(16px,2vw,34px);

    font-weight:300;

    cursor:pointer;

    padding:1vh;

    border-radius:25px;

    transition:.25s;

    position:relative;

    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    text-align:center;

    animation:quotePulse 1.6s infinite;
}

.quote-btn::before{

    content:"";

    position:absolute;
    inset:0;

    border-radius:25px;

    border:1px solid rgba(57,255,20,.15);

    box-shadow:
    0 0 20px rgba(57,255,20,.18),
    inset 0 0 20px rgba(57,255,20,.1);
}

.quote-btn:hover{

    transform:scale(1.04);

    color:#39ff14;
}

.quote-btn.active{

    background:rgba(57,255,20,.12);

    color:#39ff14;

    box-shadow:
    0 0 20px #39ff14,
    0 0 60px rgba(57,255,20,.5);
}

/* BOTTOM AREA */

.bottom-layout{

    width:100%;

    display:grid;

    grid-template-columns:
    1fr
    1fr
    1fr
    auto;

    gap:1vw;

    align-items:stretch;

    overflow:hidden;
}

/* ADD MONEY PANEL */

.money-panel{

    background:rgba(5,15,25,.7);

    border-radius:24px;

    padding:1vh;

    border:1px solid rgba(57,255,20,.15);

    box-shadow:
    0 0 20px rgba(57,255,20,.15);

    backdrop-filter:blur(18px);

    overflow:hidden;
}

/* QUICK BUTTONS */

.quick-buttons{

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:.6vh;

    margin-bottom:.8vh;
}

.quick-btn{

    height:clamp(36px,5vh,52px);

    border:none;

    border-radius:14px;

    background:#162133;

    color:white;

    font-weight:900;

    font-size:clamp(14px,1.5vw,22px);

    cursor:pointer;

    transition:.25s;

    animation:moneyPulse 1.5s infinite;
}

.quick-btn:hover{

    transform:translateY(-3px);

    background:#1fd45f;
}

/* INPUT */

.input-row{

    display:flex;

    gap:10px;
}

.amount-input{

    flex:1;

    height:clamp(40px,6vh,58px);

    border:none;

    outline:none;

    border-radius:15px;

    background:#1c2737;

    padding:0 18px;

    color:white;

    font-size:clamp(14px,1.5vw,22px);
}

.add-btn{

    width:clamp(55px,6vw,70px);

    border:none;

    border-radius:15px;

    background:#1fd45f;

    color:white;

    font-size:clamp(24px,3vw,38px);

    font-weight:900;

    cursor:pointer;

    transition:.25s;

    animation:addPulse 1s infinite;
}

/* BET BUTTON */

.bet-wrap{

    width:100%;

    overflow:hidden;
}

.bet-btn{

    width:100%;

    height:100%;

    min-height:120px;

    border:none;

    border-radius:28px;

    background:
    linear-gradient(
    135deg,
    #1fd45f,
    #16a34a
    );

    color:white;

    cursor:pointer;

    font-size:clamp(18px,2vw,30px);

    font-weight:900;

    transition:.25s;

    box-shadow:
    0 0 30px #1fd45f,
    0 0 70px rgba(31,212,95,.45);

    animation:betPulse 1.2s infinite;
}

.bet-btn:hover{

    transform:scale(1.03);
}

.bet-amount{

    display:block;

    font-size:clamp(28px,4vw,56px);

    margin-top:10px;
}

/* WIN PANEL */

.win-panel{

    width:100%;

    overflow:hidden;
}

.win-title{

    text-align:center;

    font-size:clamp(18px,2vw,32px);

    margin-bottom:1vh;
}

.win-grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:.8vh;
}

.win-item{

    background:rgba(57,255,20,.08);

    border:1px solid rgba(57,255,20,.15);

    border-radius:18px;

    padding:1vh;

    text-align:center;

    font-size:clamp(14px,1.7vw,24px);

    animation:moneyPulse 1.5s infinite;
}

.result{

    margin-top:1vh;

    text-align:center;

    font-size:clamp(14px,2vw,28px);

    font-weight:900;

    min-height:20px;

    color:#39ff14;

    text-shadow:
    0 0 10px #39ff14;
}

/* TIMER CONTAINER */

.timer-container{

    position:relative;

    margin:auto;

    width:clamp(80px,10vw,150px);
    height:clamp(80px,10vw,150px);

    border:4px solid #00ff88;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    background:rgba(0,40,0,0.35);

    box-shadow:
    0 0 15px #00ff88,
    0 0 30px #00ff88,
    0 0 60px rgba(0,255,136,0.7);

    animation:pulseCircle 1s infinite;
}

#countdown{

    font-size:clamp(32px,4vw,70px);

    font-weight:bold;

    color:#00ff88;

    text-shadow:
    0 0 10px #00ff88,
    0 0 20px #00ff88,
    0 0 40px #00ff88;

    animation:pulseText 1s infinite;
}

/* TABS */

.bottom-tabs{

    width:100%;

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:.5vw;

    background:#06110d;

    padding:.6vh;

    overflow:hidden;
}

.tab{

    height:clamp(42px,7vh,70px);

    border:none;

    border-radius:18px;

    background:#091822;

    color:white;

    font-size:clamp(10px,1vw,18px);

    cursor:pointer;

    transition:.25s;

    animation:quotePulse 2s infinite;
}

.tab:hover,
.tab.active{

    background:#1fd45f;

    box-shadow:
    0 0 20px #1fd45f;
}

/* MODAL */

.history-modal{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,0.65);

    backdrop-filter:blur(10px);

    display:none;

    justify-content:center;
    align-items:center;

    z-index:99999;
}

.modal-box{

    width:90%;

    max-width:900px;

    max-height:85vh;

    overflow:auto;

    background:rgba(0,40,0,0.45);

    border:3px solid #00ff88;

    border-radius:25px;

    box-shadow:
    0 0 20px #00ff88,
    0 0 50px rgba(0,255,136,0.5);

    padding:20px;

    position:relative;
}

/* MOBILE */

@media(max-width:900px){

    .quote-grid{

        grid-template-columns:repeat(2,1fr);
    }

    .bottom-layout{

        grid-template-columns:1fr 1fr;
    }

    .timer-container{

        grid-column:span 2;
    }
}

/* SMALL PHONES */

@media(max-width:600px){

    .main-title{

        font-size:8vw;
    }

    .quote-grid{

        grid-template-columns:1fr;
    }

    .bottom-layout{

        grid-template-columns:1fr;
    }

    .timer-container{

        grid-column:auto;
    }

    .quote-btn{

        min-height:48px;
    }

    .bet-btn{

        min-height:90px;
    }

    .tab{

        height:48px;
    }
}

</style>
</head>

<body>

<div class="main-card">

    <!-- BALANCE -->
    <div class="balance-box">

        <div class="balance-title">
            Available Balance
        </div>

        <div class="balance" id="balance">
            $0
        </div>

    </div>

    <!-- TITLE -->
    <h1 class="main-title">
        WIN THE MOST POWERFUL
    </h1>

    <!-- TIMER -->
    <div class="timer" id="timer">
        3
    </div>

    <!-- QUOTES -->
    <div class="quote-grid">

        <button class="quote-btn active">
            Unstoppable
        </button>

        <button class="quote-btn">
            Unbeatable
        </button>

        <button class="quote-btn">
            Endless
        </button>

        <button class="quote-btn">
            Limitless
        </button>

        <button class="quote-btn">
            Dominant
        </button>

        <button class="quote-btn">
            Invisible
        </button>

    </div>

    <!-- BOTTOM -->
    <div class="bottom-layout">

        <!-- MONEY -->
        <div class="money-panel">

            <div class="quick-buttons">

                <button class="quick-btn">
                    +5
                </button>

                <button class="quick-btn">
                    +10
                </button>

                <button class="quick-btn">
                    +20
                </button>

                <button class="quick-btn">
                    +50
                </button>

            </div>

            <div class="input-row">

                <input
                type="number"
                class="amount-input"
                id="amountInput"
                placeholder="Enter amount">

                <button class="add-btn" id="addBtn">
                    +
                </button>

            </div>

        </div>

        <!-- BET -->
        <div class="bet-wrap">

            <button class="bet-btn" id="betBtn">

                BET

                <span class="bet-amount" id="betAmount">
                    $0
                </span>

            </button>

        </div>

        <!-- WIN -->
        <div class="win-panel">

            <div class="win-title">
                WIN PRICE
            </div>

            <div class="win-grid">

                <div class="win-item">+5</div>
                <div class="win-item">+10</div>
                <div class="win-item">+20</div>
                <div class="win-item">+40</div>
                <div class="win-item">+60</div>
                <div class="win-item">+80</div>

            </div>

            <div class="result" id="result">
            </div>

        </div>




        <div class="timer-container">
            <div id="countdown">6</div>
        </div>

    </div>







    <!--  BOTTOM MENU BUTTONS ADD IDs TO YOUR BUTTONS  -->


    
    <div class="bottom-tabs">
    <button class="tab active" id="betHistoryBtn">Bet History</button>

    <button class="tab" id="moneyHistoryBtn">Add Money History</button>

    <button class="tab" id="winBtn">Win</button>

    <button class="tab" id="loseBtn">Lose Reward</button>



    <div id="historyModal" class="history-modal">

        <div class="modal-box">

            <!-- CLOSE BUTTON -->
            <span class="close-modal" id="closeModal">&times;</span>

            <!-- MODAL TITLE -->
            <h1 id="modalTitle">History</h1>

            <!-- MODAL CONTENT -->
            <div id="modalContent" class="modal-content">

                <!-- YOUR DATA WILL APPEAR HERE -->

            </div>

        </div>

    </div>



</div>

<script>

let balance = 0;
let betAmount = 0;

const balanceText =
document.getElementById("balance");

const betAmountText =
document.getElementById("betAmount");

const result =
document.getElementById("result");

const timer =
document.getElementById("timer");

const betBtn =
document.getElementById("betBtn");

const amountInput =
document.getElementById("amountInput");

/* SELECT QUOTES */

document.querySelectorAll(".quote-btn")
.forEach(button=>{

    button.addEventListener("click",()=>{

        document
        .querySelectorAll(".quote-btn")
        .forEach(btn=>btn.classList.remove("active"));

        button.classList.add("active");
    });
});

/* QUICK MONEY */

document.querySelectorAll(".quick-btn")
.forEach(button=>{

    button.addEventListener("click",()=>{

        const value =
        parseInt(button.innerText.replace("+",""));

        addMoney(value);
    });
});

/* ADD BUTTON */

document
.getElementById("addBtn")
.addEventListener("click",()=>{

    const value =
    parseInt(amountInput.value);

    if(!value || value <= 0){
        return;
    }

    addMoney(value);

    amountInput.value = "";
});

function addMoney(value){

    balance += value;

    betAmount += value;

    balanceText.innerText =
    "$" + balance;

    betAmountText.innerText =
    "$" + betAmount;
}

/* BET BUTTON */

betBtn.addEventListener("click",()=>{

    if(betAmount <= 0){

        result.innerText =
        "ADD MONEY";

        return;
    }

    result.innerText = "";

    timer.style.opacity = 1;

    let count = 3;

    timer.innerText = count;

    const countdown =
    setInterval(()=>{

        count--;

        if(count > 0){

            timer.innerText = count;
        }

        else if(count === 0){

            timer.innerText = "WIN";
        }

        else{

            clearInterval(countdown);

            timer.style.opacity = 0;

            const random =
            Math.random();

            if(random > .4){

                const wins =
                [5,10,20,40,60,80];

                const reward =
                wins[
                Math.floor(
                Math.random() * wins.length
                )];

                result.innerText =
                "WIN +" + reward;

                balance += reward;

                balanceText.innerText =
                "$" + balance;
            }

            else{

                result.innerText =
                "LOSE GET REWARD";
            }

            betAmount = 0;

            betAmountText.innerText =
            "$0";
        }

    },1000);
});

/* TABS */

document.querySelectorAll(".tab")
.forEach(tab=>{

    tab.addEventListener("click",()=>{

        document
        .querySelectorAll(".tab")
        .forEach(t=>t.classList.remove("active"));

        tab.classList.add("active");
    });
});




const countdown = document.getElementById("countdown");

let number = 0;

function startCountdown(){

    countdown.textContent = number;

    number++;

    if(number > 5 ){
        number = 0;
    }
}   

startCountdown();

setInterval(startCountdown, 1000);







/* =========================
GET ELEMENTS
========================= */

const historyModal = document.getElementById("historyModal");

const modalTitle = document.getElementById("modalTitle");

const modalContent = document.getElementById("modalContent");

const closeModal = document.getElementById("closeModal");


/* =========================
BUTTONS
========================= */

const betHistoryBtn = document.getElementById("betHistoryBtn");

const moneyHistoryBtn = document.getElementById("moneyHistoryBtn");

const winBtn = document.getElementById("winBtn");

const loseBtn = document.getElementById("loseBtn");


/* =========================
OPEN MODAL FUNCTION
========================= */

function openModal(title, data){

    modalTitle.innerHTML = title;

    modalContent.innerHTML = data;

    historyModal.style.display = "flex";
}


/* =========================
BET HISTORY
========================= */

betHistoryBtn.onclick = () => {

    openModal(

        "Bet History",

        `
        <div class="history-item">
            Bet Amount: $20
        </div>

        <div class="history-item">
            Bet Amount: $50
        </div>

        <div class="history-item">
            Bet Amount: $100
        </div>
        `
    );
};


/* =========================
ADD MONEY HISTORY
========================= */

moneyHistoryBtn.onclick = () => {

    openModal(

        "Add Money History",

        `
        <div class="history-item">
            Added $200
        </div>

        <div class="history-item">
            Added $500
        </div>
        `
    );
};


/* =========================
WIN HISTORY
========================= */

winBtn.onclick = () => {

    openModal(

        "Win Rewards",

        `
        <div class="history-item">
            Won +$80
        </div>

        <div class="history-item">
            Won +$40
        </div>
        `
    );
};


/* =========================
LOSE HISTORY
========================= */

loseBtn.onclick = () => {

    openModal(

        "Lose Rewards",

        `
        <div class="history-item">
            Lost -$20
        </div>

        <div class="history-item">
            Lost -$50
        </div>
        `
    );
};


/* =========================
CLOSE MODAL
========================= */

closeModal.onclick = () => {

    historyModal.style.display = "none";
};


/* =========================
CLICK OUTSIDE TO CLOSE
========================= */

window.onclick = (e) => {

    if(e.target === historyModal){

        historyModal.style.display = "none";
    }
};







</script>

</body>
</html>
