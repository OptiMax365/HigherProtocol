<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Motion Quote Cards</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f1117;
    font-family:Arial, sans-serif;
    overflow-x:hidden;
    color:white;
}

/* ========================================
   MAIN APP
======================================== */

.app{
    width:100%;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
    gap:25px;
}

/* ========================================
   MOTION AREA
======================================== */

.motion-area{
    width:100%;
    max-width:900px;
    height:420px;
    position:relative;
    overflow:hidden;
    border-radius:30px;
    background:linear-gradient(135deg,#151925,#23293a);
    box-shadow:0 0 40px rgba(0,0,0,0.5);
}

/* ========================================
   QUOTE CARD
======================================== */

.quote-card{
    width:320px;
    min-height:220px;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    border-radius:30px;
    padding:30px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.12);
    animation:floatCard 6s ease-in-out infinite;
    transition:0.5s;
}

.quote{
    font-size:1.3rem;
    line-height:1.6;
    font-weight:bold;
}

.author{
    margin-top:20px;
    font-size:0.95rem;
    opacity:0.8;
}

/* ========================================
   FLOATING ANIMATION
======================================== */

@keyframes floatCard{

    0%{
        transform:translate(-50%,-50%) translateY(0px) rotate(-2deg);
    }

    25%{
        transform:translate(-50%,-50%) translateY(-10px) rotate(2deg);
    }

    50%{
        transform:translate(-50%,-50%) translateY(0px) rotate(-2deg);
    }

    75%{
        transform:translate(-50%,-50%) translateY(10px) rotate(2deg);
    }

    100%{
        transform:translate(-50%,-50%) translateY(0px) rotate(-2deg);
    }

}

/* ========================================
   GLOW CIRCLES
======================================== */

.glow{
    position:absolute;
    border-radius:50%;
    filter:blur(50px);
    opacity:0.5;
}

.glow1{
    width:220px;
    height:220px;
    background:#ff0080;
    top:-40px;
    left:-40px;
}

.glow2{
    width:240px;
    height:240px;
    background:#00c3ff;
    bottom:-60px;
    right:-60px;
}

/* ========================================
   EDITOR SECTION
======================================== */

.editor{
    width:100%;
    max-width:900px;
    background:#171c28;
    padding:20px;
    border-radius:25px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.editor h2{
    font-size:1.3rem;
}

.input-box{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:12px;
}

textarea,
input{
    width:100%;
    border:none;
    outline:none;
    border-radius:15px;
    padding:15px;
    background:#232a3d;
    color:white;
    font-size:1rem;
}

textarea{
    min-height:120px;
    resize:none;
}

.controls{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

/* ========================================
   BUTTONS
======================================== */

button{
    flex:1;
    min-width:120px;
    border:none;
    border-radius:15px;
    padding:15px;
    cursor:pointer;
    font-size:1rem;
    font-weight:bold;
    transition:0.3s;
}

.generate-btn{
    background:#00c3ff;
    color:white;
}

.download-btn{
    background:#ff0080;
    color:white;
}

button:hover{
    transform:scale(1.04);
}

/* ========================================
   CARD PREVIEW STRIP
======================================== */

.preview-strip{
    width:100%;
    display:flex;
    gap:15px;
    overflow-x:auto;
    padding-bottom:10px;
}

.small-card{
    min-width:180px;
    height:120px;
    border-radius:20px;
    background:linear-gradient(135deg,#23293a,#111827);
    padding:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:0.9rem;
    flex-shrink:0;
}

/* ========================================
   MOBILE RESPONSIVE
======================================== */

@media(max-width:700px){

    .motion-area{
        height:380px;
    }

    .quote-card{
        width:90%;
        min-height:200px;
        padding:25px;
    }

    .quote{
        font-size:1.1rem;
    }

    .controls{
        flex-direction:column;
    }

}

</style>
</head>

<body>

<div class="app">

    <!-- ====================================
         MOTION DISPLAY
    ===================================== -->

    <div class="motion-area" id="captureArea">

        <div class="glow glow1"></div>
        <div class="glow glow2"></div>

        <div class="quote-card" id="quoteCard">

            <div class="quote" id="quoteText">
                “Dream big. Start small. Act now.”
            </div>

            <div class="author" id="authorText">
                — Motion Quotes
            </div>

        </div>

    </div>

    <!-- ====================================
         EDITOR
    ===================================== -->

    <div class="editor">

        <h2>Quote Card Editor</h2>

        <div class="input-box">

            <textarea id="quoteInput" placeholder="Write your quote here..."></textarea>

            <input type="text" id="authorInput" placeholder="Author name...">

        </div>

        <div class="controls">

            <button class="generate-btn" onclick="updateCard()">
                Update Card
            </button>

            <button class="download-btn" onclick="downloadCard()">
                Download PNG
            </button>

        </div>

        <!-- ====================================
             CARD PREVIEWS
        ===================================== -->

        <div class="preview-strip" id="previewStrip">

            <div class="small-card">
                Success starts with consistency.
            </div>

            <div class="small-card">
                Creativity changes everything.
            </div>

            <div class="small-card">
                Focus creates power.
            </div>

            <div class="small-card">
                Build your future today.
            </div>

        </div>

    </div>

</div>

<!-- ========================================
     HTML2CANVAS LIBRARY
======================================== -->

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

/* ========================================
   QUOTE LIST
======================================== */

const quotes = [

{
    quote:"Dream big. Start small. Act now.",
    author:"Motion Quotes"
},

{
    quote:"Your future is built daily.",
    author:"Creative Mind"
},

{
    quote:"Consistency creates greatness.",
    author:"Focus Studio"
},

{
    quote:"The best designs move emotions.",
    author:"Visual Motion"
}

];

/* ========================================
   AUTO SLIDE QUOTES
======================================== */

let currentIndex = 0;

function autoQuotes(){

    currentIndex++;

    if(currentIndex >= quotes.length){
        currentIndex = 0;
    }

    document.getElementById("quoteText").innerHTML =
    "“" + quotes[currentIndex].quote + "”";

    document.getElementById("authorText").innerHTML =
    "— " + quotes[currentIndex].author;

}

setInterval(autoQuotes,4000);

/* ========================================
   UPDATE CARD
======================================== */

function updateCard(){

    let quote = document.getElementById("quoteInput").value;

    let author = document.getElementById("authorInput").value;

    if(quote.trim() !== ""){

        document.getElementById("quoteText").innerHTML =
        "“" + quote + "”";

    }

    if(author.trim() !== ""){

        document.getElementById("authorText").innerHTML =
        "— " + author;

    }

}

/* ========================================
   DOWNLOAD CARD
======================================== */

function downloadCard(){

    html2canvas(document.getElementById("captureArea"),{

        scale:3

    }).then(canvas=>{

        let link = document.createElement("a");

        link.download = "quote-card.png";

        link.href = canvas.toDataURL("image/png");

        link.click();

    });

}

</script>

</body>
</html>
